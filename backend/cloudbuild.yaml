steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/fruitfulbox-platform', './backend']

  # 2. Push the image to Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/fruitfulbox-platform']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fruitfulbox-platform'
      - '--image'
      - 'gcr.io/$PROJECT_ID/fruitfulbox-platform'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/fruitfulbox-platform'

# --- THE FIX FOR YOUR ERROR ---
options:
  logging: CLOUD_LOGGING_ONLY